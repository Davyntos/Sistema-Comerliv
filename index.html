<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COMERLIV - Extracciones ML → Odoo</title>
    <!-- Librerías Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-xmlrpc/0.7.2/xmlrpc.min.js"></script>
    <!-- Archivo de Estilos Personalizados -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="bg-glow"></div>

    <div class="min-h-screen py-10 px-4 sm:px-6 lg:px-8">
        <div class="max-w-7xl mx-auto">
            <!-- Header -->
            <div class="mb-10 text-center lg:text-left">
                <h1 class="text-4xl font-extrabold text-white tracking-wider mb-2">COMERLIV</h1>
                <p class="text-xs uppercase tracking-widest text-[#D4AF37] font-bold">Extracciones Mercado Libre Full → Odoo ERP</p>
            </div>

            <!-- Split Grid -->
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
                
                <!-- COLUMN LEFT: Inputs & Controls -->
                <div class="lg:col-span-5 space-y-6">
                    <div class="glass rounded-2xl p-6 sm:p-8">
                        <div class="space-y-5">
                            <div>
                                <label for="operator" class="block text-xs uppercase tracking-wider font-semibold text-gray-400 mb-2">
                                    👤 Seleccionar Operador
                                </label>
                                <select id="operator" class="w-full">
                                    <option value="">-- Elige un operador --</option>
                                    <option value="victor">Víctor Arroyo (atencionaclientescomerliv@gmail.com)</option>
                                    <option value="lizbeth">Lizbeth Vargas (carlo.h@comerliv.com)</option>
                                </select>
                            </div>

                            <div>
                                <label for="extractionId" class="block text-xs uppercase tracking-wider font-semibold text-gray-400 mb-2">
                                    🆔 ID de Extracción
                                </label>
                                <input type="text" id="extractionId" placeholder="Ej: 11431398" class="w-full">
                            </div>

                            <div>
                                <label for="htmlInput" class="block text-xs uppercase tracking-wider font-semibold text-gray-400 mb-2">
                                    📋 Pegar HTML de Mercado Libre
                                </label>
                                <textarea id="htmlInput" placeholder="Copia aquí el HTML completo de los bultos..." class="w-full h-36 resize-none text-xs"></textarea>
                            </div>

                            <button id="parseBtn" class="btn-primary w-full py-3.5 text-xs uppercase tracking-wider rounded-xl">
                                🔍 Analizar HTML y Mostrar Bultos
                            </button>
                        </div>
                    </div>

                    <div id="leftAlertsContainer"></div>
                    <div id="summaryContainer"></div>
                </div>

                <!-- COLUMN RIGHT: Output Cards -->
                <div class="lg:col-span-7 space-y-6">
                    <div class="border-b border-gray-800 pb-3 flex justify-between items-center">
                        <h2 class="text-sm font-bold uppercase tracking-widest text-[#D4AF37]">📦 Bultos Identificados</h2>
                        <span id="bultosCount" class="text-xs text-gray-400 bg-neutral-900 px-3 py-1 rounded-full border border-gray-800">0 bultos</span>
                    </div>

                    <div id="placeholderContainer" class="glass-light rounded-2xl p-12 text-center text-gray-500">
                        <svg class="mx-auto h-12 w-12 text-gray-600 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4" />
                        </svg>
                        <p class="text-sm">Completa el formulario de la izquierda y haz clic en "Analizar HTML" para listar los bultos con sus nombres reales.</p>
                    </div>

                    <div id="bultosContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
                </div>

            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="summaryModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div class="modal-overlay absolute inset-0" onclick="closeModal()"></div>
        <div class="glass rounded-2xl max-w-md w-full p-6 relative z-10">
            <h3 class="text-lg font-bold text-white mb-4 flex items-center gap-2 border-b border-gray-800 pb-3">
                📋 Resumen de Operación (Bulto)
            </h3>
            <div id="modalContent" class="space-y-4 text-sm text-gray-300 mb-6"></div>
            <button onclick="closeModal()" class="btn-primary w-full py-2.5 rounded-lg text-xs uppercase tracking-wider">
                Cerrar Ventana
            </button>
        </div>
    </div>

    <!-- Archivo de Lógica JavaScript -->
    <script src="script.js"></script>
</body>
</html>
